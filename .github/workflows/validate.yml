name: validate-skills

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Validate skill frontmatter
        run: python scripts/validate_skills.py

      - name: Verify index.json is in sync
        run: python scripts/build_index.py --check

      - name: Verify index.json is valid JSON
        run: python -c "import json; json.load(open('index.json', encoding='utf-8'))"

      - name: Byte-compile all Python helpers
        run: find . -name '*.py' -not -path './.git/*' -print0 | xargs -0 -n1 python -m py_compile

      - name: Syntax-check all shell helpers
        run: find . -name '*.sh' -not -path './.git/*' -print0 | xargs -0 -n1 bash -n
